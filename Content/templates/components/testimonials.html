      <h2>Success Stories</h2>
      <p class="section-desc">Our company success stories in one continuous scrolling showcase.</p>
    </div>

      <div class="success-track">

        </figure>

          <img src="/static/images/success-stories/story-5.jpg" alt="Company success story 5" loading="lazy" tabindex="0">
        </figure>

          <img src="/static/images/success-stories/story-6.jpg" alt="Company success story 6" loading="lazy" tabindex="0">
        </figure>

          <img src="/static/images/success-stories/story-7.jpg" alt="Company success story 7" loading="lazy" tabindex="0">

        </figure>
        <figure class="success-story-item">
          <img src="/static/images/success-stories/story-9.jpg" alt="Company success story 9" loading="lazy" tabindex="0">
        </figure>
        <figure class="success-story-item">
          <img src="/static/images/success-stories/story-10.jpg" alt="Company success story 10" loading="lazy" tabindex="0">
        </figure>
        <figure class="success-story-item" aria-hidden="true">
          <img src="/static/images/success-stories/story-1.jpg" alt="" loading="lazy">
        </figure>
        <figure class="success-story-item" aria-hidden="true">
          <img src="/static/images/success-stories/story-2.jpg" alt="" loading="lazy">
        </figure>
        <figure class="success-story-item" aria-hidden="true">

          <img src="/static/images/success-stories/story-10.jpg" alt="" loading="lazy">

      </div>
    </div>
    <div class="success-stories-controls" aria-label="Manual success stories controls">
      <button type="button" class="success-control-btn" id="successStoriesPrev">Previous</button>
      <button type="button" class="success-control-btn" id="successStoriesNext">Next</button>
    </div>
    <div class="success-lightbox" id="successLightbox" aria-hidden="true">
      <div class="success-lightbox-backdrop" data-close-lightbox></div>
      <div class="success-lightbox-dialog" role="dialog" aria-modal="true" aria-label="Success story image preview">
        <button type="button" class="success-lightbox-nav success-lightbox-nav--prev" id="successLightboxPrev" aria-label="Previous image">&#8249;</button>
        <button type="button" class="success-lightbox-nav success-lightbox-nav--next" id="successLightboxNext" aria-label="Next image">&#8250;</button>
        <button type="button" class="success-lightbox-close" id="successLightboxClose" aria-label="Close image preview">&times;</button>
        <div class="success-lightbox-zoom-controls">
          <button type="button" class="success-lightbox-zoom-btn" id="successZoomOut" aria-label="Zoom out">-</button>
          <button type="button" class="success-lightbox-zoom-btn" id="successZoomReset" aria-label="Reset zoom">100%</button>
          <button type="button" class="success-lightbox-zoom-btn" id="successZoomIn" aria-label="Zoom in">+</button>
        </div>
        <img id="successLightboxImage" src="" alt="">
      </div>
