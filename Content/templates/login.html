<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or 'COEPD Sign In' }}</title>
  <style>
    :root { --bg:#eef6ff; --card:#ffffff; --text:#0f172a; --muted:#475569; --primary:#0f766e; --border:#d8e2ee; }
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: radial-gradient(circle at top right, #dbeafe, var(--bg)); color: var(--text); }
    .page { min-height: 100vh; display: grid; place-items: center; padding: 16px; }
    .card { width: min(420px, 95vw); background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); padding: 24px; }
    h1 { margin: 0 0 10px; font-size: 26px; }
    p { margin: 0 0 18px; color: var(--muted); line-height: 1.4; }
    label { display:block; margin: 10px 0 6px; font-weight: 600; }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .error {
      margin: 0 0 10px;
      color: #b91c1c;
      font-size: 14px;
      min-height: 18px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      padding: 12px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>{{ title or 'Sign In' }}</h1>
      <p>{{ description or 'Enter your email and password to continue.' }}</p>
      <p class="error">{{ error or '' }}</p>
      <form method="post" action="{{ submit_path or '/login' }}">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
        <button class="btn" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
